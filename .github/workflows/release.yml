name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # A single job creates the draft release up front so the parallel build
  # jobs below only ever attach assets to it. Letting each build job create
  # the release itself races and can produce duplicate drafts for one tag.
  create-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_NOTES: |
        Download the asset for your platform below.

        **macOS**: builds are ad-hoc signed (no Apple Developer ID), so the first
        launch is blocked by Gatekeeper. Allow it via System Settings >
        Privacy & Security > "Open Anyway", or run:
        `xattr -cr /Applications/voyager.app`
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Voyager ${{ github.ref_name }}" \
            --draft \
            --notes "$RELEASE_NOTES"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 build dependencies for Linux (patchelf and xdg-utils are for AppImage)
      - if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Windows bundling is intentionally disabled (msi/nsis are both
      # installers; see tauri.windows.conf.json), and tauri-action errors
      # when it finds no bundle artifacts — so build directly instead.
      - if: matrix.platform == 'windows-latest'
        run: pnpm tauri build

      - if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing: required for Apple Silicon binaries without a Developer ID
          APPLE_SIGNING_IDENTITY: "-"
        with:
          # Matches the tag create-release used, so tauri-action finds that
          # release and attaches assets instead of creating another one.
          tagName: ${{ github.ref_name }}
          args: ${{ matrix.args }}

      # Tauri has no portable bundle target for Windows, so ship the raw exe
      # zipped in its own folder instead.
      - if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          New-Item -ItemType Directory -Path voyager | Out-Null
          Copy-Item src-tauri/target/release/voyager.exe voyager/
          $zip = "voyager_${version}_x64_portable.zip"
          Compress-Archive -Path voyager -DestinationPath $zip
          gh release upload "${{ github.ref_name }}" $zip --clobber
