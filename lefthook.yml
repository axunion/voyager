# https://lefthook.dev/configuration/
# Sequential: biome/rustfmt rewrite files (auto-staged), typecheck runs on the result
pre-commit:
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: rustfmt
      glob: "*.rs"
      run: cargo fmt --manifest-path src-tauri/Cargo.toml
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: pnpm exec tsc --noEmit
